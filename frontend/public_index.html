<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מערכת ניהול התרעות חכמה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; color: #f8fafc;
            width: 100%; height: 100vh; margin: 0; padding: 0; overflow: hidden;
        }
        @keyframes pulse-red    { 0%,100%{background-color:#7f1d1d} 50%{background-color:#ef4444} }
        @keyframes pulse-orange { 0%,100%{background-color:#7c2d12} 50%{background-color:#f97316} }
        @keyframes pulse-purple { 0%,100%{background-color:#4c1d95} 50%{background-color:#7c3aed} }
        .emergency-mode-red    { animation: pulse-red    1s infinite; color:white; }
        .emergency-mode-orange { animation: pulse-orange 2s infinite; color:white; }
        .emergency-mode-purple { animation: pulse-purple 2s infinite; color:white; }
        input[type=range] { accent-color: #3b82f6; }
        .map-container { z-index: 10; }
        .emergency-border-red    { border:4px solid #ef4444; box-shadow:0 0 20px #ef4444; }
        .emergency-border-orange { border:4px solid #f97316; box-shadow:0 0 20px #f97316; }
        .emergency-border-purple { border:4px solid #a855f7; box-shadow:0 0 20px #a855f7; }
        .custom-scrollbar::-webkit-scrollbar       { width:6px; height:6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background:rgba(15,23,42,.5); border-radius:4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background:rgba(59,130,246,.5); border-radius:4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background:rgba(59,130,246,.8); }
        .mode-card {
            position:relative; border-radius:.75rem; padding:.6rem .75rem;
            border-width:1px; border-style:solid; display:flex; align-items:flex-start;
            gap:.6rem; transition:all .4s;
        }
        .mode-card.active-card { box-shadow:0 0 18px var(--glow-color,#3b82f6); }
        .mode-card-dot { width:10px; height:10px; border-radius:9999px; flex-shrink:0; margin-top:4px; }
        .mode-card.active-card .mode-card-dot { animation:dot-pulse 1.2s infinite; }
        @keyframes dot-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.4)} }
        .mode-card.active-card::before {
            content:''; position:absolute; inset:-2px; border-radius:.8rem;
            border:2px solid var(--glow-color,#3b82f6); pointer-events:none;
        }
        @keyframes toast-in  { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @keyframes toast-out { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(20px)} }
        .toast-enter { animation: toast-in  .3s ease forwards; }
        .toast-exit  { animation: toast-out .3s ease forwards; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const API_BASE = "/api";

// ── צבעי פוליגון לפי סוג התרעה ──
const POLYGON_STYLES = {
    EMERGENCY:     { color: "#ef4444", fillColor: "#ef4444", fillOpacity: 0.35, weight: 3, dashArray: null },
    EARLY_WARNING: { color: "#a855f7", fillColor: "#a855f7", fillOpacity: 0.20, weight: 2, dashArray: "6,6" },
    UAV:           { color: "#f97316", fillColor: "#f97316", fillOpacity: 0.30, weight: 3, dashArray: "4,4" },
    PENDING:       { color: "#facc15", fillColor: "#facc15", fillOpacity: 0.20, weight: 2, dashArray: "8,4" },
};

function getPolygonStyle(polygonType) {
    return POLYGON_STYLES[polygonType] || POLYGON_STYLES.EMERGENCY;
}

const MAP_LEGEND = [
    { color: "#a855f7", label: "התרעה מוקדמת",         hint: "התכונן — עדיין יש זמן" },
    { color: "#ef4444", label: "אזעקה פעילה",           hint: "היכנס מיד למרחב מוגן!" },
    { color: "#f97316", label: "כטב\"ם עוין",            hint: "היכנס למרחב מוגן!" },
    { color: "#facc15", label: "ממתין לסיום אירוע",     hint: "הישאר במקלט עד לאישור" },
    { color: "#3b82f6", label: "אזור מעקב",             hint: "האזור שהגדרת למעקב" },
];

const CITIES_COORDS = {

    "נתניה":{lat:32.3215,lng:34.8532},"באר שבע":{lat:31.2518,lng:34.7913},
    "בני ברק":{lat:32.0849,lng:34.8352},"חולון":{lat:32.0158,lng:34.7874},

    "רחובות":{lat:31.8945,lng:34.8113},"בת ים":{lat:32.0154,lng:34.7431},
    "בית שמש":{lat:31.7470,lng:34.9881},"כפר סבא":{lat:32.1713,lng:34.9080},
    "הרצליה":{lat:32.1624,lng:34.8447},"חדרה":{lat:32.4363,lng:34.9142},
    "מודיעין":{lat:31.9054,lng:35.0084},"לוד":{lat:31.9482,lng:34.8887},
    "רמלה":{lat:31.9271,lng:34.8631},"רעננה":{lat:32.1848,lng:34.8713},
    "מודיעין עילית":{lat:31.9333,lng:35.0333},"הוד השרון":{lat:32.1558,lng:34.8944},
    "קרית אתא":{lat:32.8023,lng:35.1054},"גבעתיים":{lat:32.0722,lng:34.8105},
    "קרית גת":{lat:31.6056,lng:34.7708},"נהריה":{lat:33.0116,lng:35.0945},
    "ביתר עילית":{lat:31.7000,lng:35.1000},"עפולה":{lat:32.6104,lng:35.2869},
    "אום אל פחם":{lat:32.5181,lng:35.1522},"אילת":{lat:29.5577,lng:34.9519},

    "אלעד":{lat:32.0531,lng:34.9507},"יבנה":{lat:31.8767,lng:34.7397},

    "כרמיאל":{lat:32.9150,lng:35.3000},"שפרעם":{lat:32.8050,lng:35.1700},
    "קרית אונו":{lat:32.0633,lng:34.8606},"קרית ביאליק":{lat:32.8394,lng:35.0864},
    "מעלה אדומים":{lat:31.7761,lng:35.2975},"קרית ים":{lat:32.8397,lng:35.0689},
    "אור יהודה":{lat:32.0306,lng:34.8542},"צפת":{lat:32.9642,lng:35.4981},
    "טירה":{lat:32.2333,lng:34.9333},"דימונה":{lat:31.0667,lng:35.0333},
    "שדרות":{lat:31.5222,lng:34.5956},"נתיבות":{lat:31.4217,lng:34.5861},
    "אופקים":{lat:31.3128,lng:34.6200},"אריאל":{lat:32.1056,lng:35.1856},
    "מגדל העמק":{lat:32.6667,lng:35.2500},"ערד":{lat:31.2589,lng:35.2150},
    "קריית שמונה":{lat:33.2075,lng:35.5683},"קרית מלאכי":{lat:31.7275,lng:34.7433},
    "נצרת":{lat:32.7019,lng:35.3033},"טירת כרמל":{lat:32.7667,lng:34.9667},
    "עכו":{lat:32.9272,lng:35.0825},"נוף הגליל":{lat:32.7033,lng:35.3050},
    "יקנעם עילית":{lat:32.6467,lng:35.1050},"רהט":{lat:31.3917,lng:34.7556},
    "סח'נין":{lat:32.8667,lng:35.3000},"עראבה":{lat:32.8500,lng:35.3333},
    "מעלות תרשיחא":{lat:33.0167,lng:35.2667},"באקה אל-גרביה":{lat:32.4167,lng:35.0333},
    "מגאר":{lat:32.8833,lng:35.4000},"טמרה":{lat:32.8500,lng:35.1833},
};

function getApproxCoords(name) {
    if(CITIES_COORDS[name]) return CITIES_COORDS[name];
    for(const[k,v]of Object.entries(CITIES_COORDS)) if(name.includes(k)||k.includes(name)) return v;
    return null;
}

const THREAT_MODES = [
    { id:"ROUTINE",       label:"שגרה",             icon:"fa-check-circle",        dotColor:"#22c55e", borderColor:"#16a34a", bgColor:"rgba(21,128,61,.10)",  glowColor:"#22c55e", textColor:"#86efac", description:"אין התרעות פעילות באזורך." },
    { id:"PENDING_EVENT", label:"ממתין לסיום אירוע", icon:"fa-hourglass-half",       dotColor:"#facc15", borderColor:"#eab308", bgColor:"rgba(234,179,8,.15)",  glowColor:"#facc15", textColor:"#fef08a", description:"הישאר במרחב המוגן עד לקבלת אישור סופי (שגרה)." },
    { id:"CLOSE_THREAT",  label:"עירני",             icon:"fa-eye",                 dotColor:"#fb923c", borderColor:"#ea580c", bgColor:"rgba(234,88,12,.13)",  glowColor:"#f97316", textColor:"#fdba74", description:"שיגורים בקרבתך. הישאר קרוב למרחב מוגן." },
    { id:"EARLY_WARNING", label:"התרעה מוקדמת",     icon:"fa-clock",               dotColor:"#c084fc", borderColor:"#9333ea", bgColor:"rgba(147,51,234,.13)", glowColor:"#a855f7", textColor:"#e9d5ff", description:"איום ארוך-טווח. זמן התארגנות מורחב." },
    { id:"EMERGENCY",     label:"אזעקה מידית",       icon:"fa-radiation",           dotColor:"#f87171", borderColor:"#dc2626", bgColor:"rgba(220,38,38,.18)",  glowColor:"#ef4444", textColor:"#fca5a5", description:"אזעקה פעילה באזור המעקב שלך. היכנס מיד למרחב המוגן!" },
];

function StatusModesPanel({ threatLevel }) {
    return (
        <div className="bg-slate-800/90 backdrop-blur rounded-2xl p-4 border border-slate-700 shadow-xl flex flex-col gap-3">
            <h3 className="text-sm font-bold text-slate-300 mb-1 border-b border-slate-700 pb-2">מצבי התרעה</h3>
            <div className="flex flex-col gap-2">
                {THREAT_MODES.map(mode=>{
                    const isActive = threatLevel===mode.id;
                    return (
                        <div key={mode.id}
                            className={`mode-card ${isActive?'active-card':''}`}
                            style={{
                                '--glow-color':mode.glowColor,
                                borderColor: isActive?mode.borderColor:'rgba(71,85,105,0.4)',
                                backgroundColor: isActive?mode.bgColor:'rgba(30,41,59,0.5)',
                            }}>
                            <div className="mode-card-dot shadow-sm" style={{backgroundColor:mode.dotColor, boxShadow:isActive?`0 0 8px ${mode.dotColor}`:'none'}}></div>
                            <div className="flex flex-col gap-0.5">
                                <span className="font-bold text-sm" style={{color:isActive?mode.textColor:'#cbd5e1'}}>{mode.label}</span>
                                {isActive && <span className="text-[11px] leading-tight text-slate-300/90">{mode.description}</span>}
                            </div>
                            <i className={`fas ${mode.icon} absolute left-3 top-1/2 -translate-y-1/2 text-2xl opacity-20`} style={{color:mode.dotColor}}></i>
                        </div>
                    );
                })}
            </div>
        </div>
    );
}

function Toast({ toasts }) {
    return (
        <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[99999] flex flex-col gap-2 pointer-events-none w-[90%] md:w-auto max-w-sm">
            {toasts.map(t=>(
                <div key={t.id} className={`toast-enter ${t.exiting?'toast-exit':''} flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl border text-white backdrop-blur-md ${t.type==='error'?'bg-red-900/90 border-red-500':'bg-slate-800/90 border-slate-600'}`}>
                    <i className={`fas ${t.type==='error'?'fa-exclamation-circle text-red-400':'fa-info-circle text-blue-400'} text-xl`}></i>
                    <span className="font-medium text-sm">{t.message}</span>
                </div>
            ))}
        </div>
    );
}

function MapLegend() {
    return (
        <div className="absolute bottom-4 left-4 z-[400] bg-slate-900/85 backdrop-blur-md p-3 rounded-xl border border-slate-700 shadow-xl pointer-events-none flex flex-col gap-1.5 min-w-[140px]">
            <div className="text-xs font-bold text-slate-400 mb-1 border-b border-slate-700 pb-1">מקרא מפה</div>
            {MAP_LEGEND.map((item,i)=>(
                <div key={i} className="flex items-center gap-2 group relative">
                    <div className="w-3.5 h-3.5 rounded-sm shrink-0 border border-white/20 shadow-sm" style={{backgroundColor:item.color}}></div>
                    <span className="text-xs font-medium text-slate-200">{item.label}</span>
                    <div className="absolute right-full mr-2 bg-slate-800 text-slate-200 text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap border border-slate-600 shadow-lg pointer-events-none z-[401]">
                        {item.hint}
                    </div>
                </div>
            ))}
        </div>
    );
}

const MapView = React.memo(({ threatLevel, allAlerts, isActiveTab, monitoredAreas, radiusKm, hasPendingPolygons }) => {
    const mapRef = useRef(null);
    const containerRef = useRef(null);
    const markersRef = useRef([]);
    const polygonRef = useRef(null);
    const radiusCircleRef = useRef(null);
    const prevAlertCount = useRef(0);
    const [mapError, setMapError] = useState(false);
    const [isMapReady, setIsMapReady] = useState(false);
    const prevPendingCount = useRef(0);

    useEffect(()=>{
        if(!isActiveTab || !containerRef.current || mapRef.current || mapError) return;
        try{
            const m = L.map(containerRef.current,{zoomControl:false, attributionControl:false}).setView([31.5,34.8],7);
            L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}&hl=he',{maxZoom:19, attribution:'&copy; Google Maps'}).addTo(m);
            mapRef.current = m;
            setIsMapReady(true);
            setTimeout(()=>{if(mapRef.current) mapRef.current.invalidateSize();},300);
        }catch(e){console.error("Map init error:",e); setMapError(true);}
        return ()=>{
            if(mapRef.current){
                mapRef.current.remove();
                mapRef.current=null;
                setIsMapReady(false);
            }
        };
    },[isActiveTab, mapError]);

    useEffect(()=>{
        if(!mapRef.current || !isMapReady) return;
        markersRef.current.forEach(m=>m.remove());
        markersRef.current=[];
        if(polygonRef.current){ polygonRef.current.remove(); polygonRef.current=null;}
        if(radiusCircleRef.current){ radiusCircleRef.current.remove(); radiusCircleRef.current=null;}

        const pendingPolygons = allAlerts.filter(a=>a.polygon_type==="PENDING");
        if(pendingPolygons.length !== prevPendingCount.current) {
            mapRef.current.invalidateSize();
            prevPendingCount.current = pendingPolygons.length;
        }

        const lats=[], lngs=[];
        const activePolygons = [];

        allAlerts.forEach(a => {
            const polyType = a.polygon_type || "EMERGENCY";
            const cityName = a.name;
            if (!cityName) return;

            let c = null;
            if (a.lat && a.lng) {
                c = { lat: a.lat, lng: a.lng };
            } else {
                c = getApproxCoords(cityName);
            }

            if (a.polygon && Array.isArray(a.polygon) && a.polygon.length > 0) {
                activePolygons.push({ coords: a.polygon, type: polyType, cityName, title: a.title });
            } else if (c) {
                lats.push(c.lat); lngs.push(c.lng);
                const isMonitored = monitoredAreas.some(area => cityName.includes(area) || area.includes(cityName));
                
                const markerIconHtml = `
                    <div style="position:relative;width:12px;height:12px;display:flex;align-items:center;justify-content:center;">
                        <div style="width:12px;height:12px;border-radius:50%;background-color:${POLYGON_STYLES[polyType].color};border:2px solid white;box-shadow:0 0 5px ${POLYGON_STYLES[polyType].color};z-index:2"></div>
                        ${isMonitored ? `<div style="position:absolute;top:-8px;right:-8px;background:#3b82f6;color:white;border-radius:50%;width:12px;height:12px;display:flex;align-items:center;justify-content:center;font-size:6px;border:1px solid white;"><i class="fas fa-crosshairs"></i></div>` : ''}
                    </div>
                `;

                const m = L.marker([c.lat, c.lng], {
                    icon: L.divIcon({className: 'custom-alert-marker', html: markerIconHtml, iconSize: [12, 12], iconAnchor: [6, 6]})
                }).bindPopup(`
                    <div class="text-right p-1" dir="rtl">
                        <strong class="text-red-600 block mb-1">${cityName}</strong>
                        <span class="text-xs text-slate-600">${a.title || 'התרעה'}</span><br>
                        <span class="text-[10px] text-slate-400 mt-1 block">סוג: ${polyType}</span>
                    </div>
                `).addTo(mapRef.current);
                markersRef.current.push(m);
            }
        });

        if (activePolygons.length > 0) {
            const layers = activePolygons.map(p => {
                const style = getPolygonStyle(p.type);
                return L.polygon(p.coords, style).bindPopup(`
                    <div class="text-right p-1" dir="rtl">
                        <strong class="text-red-600 block mb-1">${p.cityName}</strong>
                        <span class="text-xs text-slate-600">${p.title || 'התרעה'}</span><br>
                        <span class="text-[10px] text-slate-400 mt-1 block">סוג: ${p.type}</span>
                    </div>
                `);
            });
            polygonRef.current = L.layerGroup(layers).addTo(mapRef.current);
            layers.forEach(l => {
                l.getLatLngs()[0].forEach(pt => { lats.push(pt.lat); lngs.push(pt.lng); });
            });
        }

        let addedMonitored = false;
        monitoredAreas.forEach(area=>{
            const c = getApproxCoords(area);
            if(c){
                lats.push(c.lat); lngs.push(c.lng); addedMonitored = true;
                const areaMarkerHtml = `
                    <div style="width:14px;height:14px;border-radius:50%;background-color:#3b82f6;border:2px solid white;box-shadow:0 0 10px #3b82f6;"></div>
                `;
                const m = L.marker([c.lat,c.lng],{
                    icon: L.divIcon({className:'monitored-area-marker',html:areaMarkerHtml,iconSize:[14,14],iconAnchor:[7,7]})
                }).bindPopup(`<div class="text-right p-1 text-blue-600 font-bold" dir="rtl">${area} (אזור מעקב)</div>`).addTo(mapRef.current);
                markersRef.current.push(m);

                if(radiusKm>0){
                    radiusCircleRef.current = L.circle([c.lat,c.lng],{
                        radius:radiusKm*1000, color:'#3b82f6', fillColor:'#3b82f6', fillOpacity:0.05, weight:1, dashArray:'4,4'
                    }).addTo(mapRef.current);
                }
            }
        });

        // Explicitly removed automatic zoom/pan based on user request to prevent flickering.
        // The user manually controls map zoom and panning.
        prevAlertCount.current = allAlerts.length;

    },[allAlerts, isActiveTab, monitoredAreas, radiusKm, isMapReady]);

    useEffect(()=>{
        if(mapRef.current && isActiveTab && isMapReady){ setTimeout(()=>{mapRef.current.invalidateSize();},400); }
    },[isActiveTab, isMapReady]);

    if(mapError) return <div className="w-full h-full flex items-center justify-center bg-slate-800 text-slate-400 p-4 text-center border-2 border-dashed border-slate-700 rounded-xl"><i className="fas fa-exclamation-triangle ml-2"></i> שגיאה בטעינת המפה. אנא רענן.</div>;
    return (
        <div className="w-full h-full relative z-10 rounded-2xl overflow-hidden shadow-inner">
            <div ref={containerRef} className="w-full h-full z-10 map-container bg-slate-900"></div>
            <MapLegend/>
        </div>
    );
});

function MobileBottomSheet({ threatLevel, statusBoxClass, statusIcon, statusTitle, statusSub, areasInput, setAreasInput, handleDraftChange, draftConfig }) {
    const [isOpen, setIsOpen] = useState(false);
    return (
        <div className="md:hidden z-[100] mt-auto w-full max-h-[50vh] flex flex-col pointer-events-none relative shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
            <div className="pointer-events-auto bg-slate-900 border-t border-slate-700 rounded-t-3xl flex flex-col overflow-hidden max-h-full transition-all duration-300">
                <div onClick={()=>setIsOpen(!isOpen)} className="w-full flex items-center justify-center py-2 cursor-pointer bg-slate-800/50 hover:bg-slate-800 active:bg-slate-700">
                    <div className="w-12 h-1.5 bg-slate-600 rounded-full"></div>
                </div>
                
                <div className={`flex flex-col flex-shrink-0 transition-colors ${statusBoxClass} border-b border-black/20 p-3 items-center justify-center text-center`} onClick={()=>setIsOpen(!isOpen)}>
                    <i className={`fas ${statusIcon} text-3xl mb-1 drop-shadow-md`}></i>
                    <h2 className="text-lg font-bold leading-tight">{statusTitle}</h2>
                    {isOpen && <p className="text-xs font-medium opacity-90">{statusSub}</p>}
                </div>

                <div className={`overflow-y-auto custom-scrollbar flex-1 bg-slate-900 pointer-events-auto transition-all duration-300 ease-in-out ${isOpen?'opacity-100 max-h-[35vh]':'opacity-0 max-h-0'}`}>
                    <div className="p-4 flex flex-col gap-4">
                        <div className="bg-slate-800/90 rounded-2xl p-3 border border-slate-700 flex flex-col gap-2">
                            <div className="flex items-center gap-2">
                                <i className="fas fa-crosshairs text-blue-400"></i>
                                <span className="text-sm font-bold text-slate-200">אזורי התרעה ממוקדים</span>
                            </div>
                            <textarea value={areasInput}
                                onChange={e=>{
                                    setAreasInput(e.target.value);
                                    handleDraftChange('areas',e.target.value.split(',').map(a=>a.trim()).filter(a=>a!==""));
                                }}
                                className="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-white text-xs focus:border-blue-500 focus:outline-none resize-none"
                                rows="1" placeholder="חיפה, אשדוד..."></textarea>
                            <div className="flex flex-wrap gap-1 mt-1">
                                {(draftConfig.areas||[]).map((area,i)=>(
                                    <span key={i} className="bg-blue-900/40 text-blue-200 border border-blue-700/50 px-2 py-0.5 rounded-full text-[10px]">{area}</span>
                                ))}
                            </div>
                        </div>

                        <StatusModesPanel threatLevel={threatLevel}/>
                    </div>
                </div>
            </div>
        </div>
    );
}

function App() {
    const [status, setStatus] = useState({
        threat_level:"ROUTINE", all_alerts:[], close_threat:false
    });
    const [draftConfig, setDraftConfig] = useState({});
    const [areasInput, setAreasInput] = useState("");
    const [toasts, setToasts] = useState([]);
    
    const prevThreatRef = useRef("ROUTINE");

    useEffect(() => {
        let isSubscribed = true;
        const savedAreas = localStorage.getItem("myAreas");
        if (savedAreas) {
            const parsedAreas = JSON.parse(savedAreas);
            setDraftConfig({areas: parsedAreas});
            setAreasInput(parsedAreas.join(", "));
        }

        const fetchStatus = async () => {
            if(!isSubscribed) return;
            try {
                const res = await fetch(`${API_BASE}/status`);
                const data = await res.json();
                
                let threat = "ROUTINE";
                if(data.status === "1") {
                     threat = data.is_early_warning ? "EARLY_WARNING" : "EMERGENCY";
                } else if(data.status === "2") {
                    threat = "PENDING_EVENT";
                } else if(data.close_threat) {
                    threat = "CLOSE_THREAT";
                }
                
                setStatus(prevStatus => {
                    const newAlerts = data.all_alerts || [];
                    const newCloseThreat = data.close_threat || false;
                    
                    if (
                        prevStatus.threat_level === threat &&
                        prevStatus.close_threat === newCloseThreat &&
                        JSON.stringify(prevStatus.all_alerts) === JSON.stringify(newAlerts)
                    ) {
                        return prevStatus;
                    }
                    
                    return {
                        threat_level: threat,
                        all_alerts: newAlerts,
                        close_threat: newCloseThreat
                    };
                });

                if(threat !== prevThreatRef.current) {
                    prevThreatRef.current = threat;
                }

            } catch (err) {}
        };
        fetchStatus();
        const interval = setInterval(fetchStatus, 1000);
        return () => { isSubscribed = false; clearInterval(interval); };
    }, []);

    useEffect(() => {
        if(draftConfig.areas) {
            localStorage.setItem("myAreas", JSON.stringify(draftConfig.areas));
        }
    }, [draftConfig.areas]);

    const handleDraftChange = (key, val) => setDraftConfig(prev=>({...prev, [key]:val}));

    let bgClass='bg-slate-900';
    let statusBoxClass='bg-slate-800 text-slate-300 border-slate-600';
    let statusIcon='fa-shield-alt text-blue-400';
    let statusTitle='שגרה מבורכת';
    let statusSub='האזן להנחיות פיקוד העורף בעת הצורך';

    const hasPendingPolygons = status.all_alerts.some(a=>a.polygon_type==="PENDING");
    const activeAlerts = status.all_alerts.filter(a=>a.polygon_type==="EMERGENCY"||a.polygon_type==="EARLY_WARNING"||a.polygon_type==="UAV");
    const pendingCount = status.all_alerts.filter(a=>a.polygon_type==="PENDING").length;

    if(status.threat_level==="EMERGENCY") {
        bgClass='emergency-mode-red';
        statusBoxClass='bg-red-900 border-red-500 shadow-[0_0_30px_#ef4444] text-white';
        statusIcon='fa-radiation animate-spin text-red-200'; statusTitle='אזעקה פעילה!';
        statusSub='היכנס מיד למרחב המוגן והישאר בו 10 דקות!';
    } else if(status.threat_level==="EARLY_WARNING") {
        bgClass='emergency-mode-purple';
        statusBoxClass='bg-purple-900 border-purple-500 shadow-[0_0_30px_#a855f7] text-white';
        statusIcon='fa-clock animate-pulse text-purple-200'; statusTitle='התרעה מוקדמת!';
        statusSub='איום זוהה ממרחק. יש לך זמן להתארגן. התקדם ברוגע למרחב המוגן.';
    } else if(status.threat_level==="CLOSE_THREAT") {
        bgClass='emergency-mode-orange';
        statusBoxClass='bg-orange-800 border-orange-500 shadow-[0_0_20px_#f97316] text-white';
        statusIcon='fa-exclamation-triangle text-orange-200 animate-pulse'; statusTitle='שיגורים בקרבתך!';
        statusSub='הישאר סמוך למרחב מוגן או הכי מוגן שיש. ייתכנו יירוטים קרובים.';
    } else if(status.threat_level==="PENDING_EVENT") {
        bgClass='bg-slate-900';
        statusBoxClass='bg-yellow-600 border-yellow-400 shadow-[0_0_20px_#facc15] text-white';
        statusIcon='fa-hourglass-half text-yellow-100 animate-pulse'; statusTitle='ממתין לסיום אירוע';
        statusSub='הישאר במרחב המוגן עד לקבלת אישור סופי!';
    } else if(status.all_alerts.length>0) {
        bgClass='bg-slate-900';
        statusBoxClass='bg-blue-900 border-blue-500 text-white';
        statusIcon='fa-info-circle text-blue-300'; statusTitle='התרעות פעילות בארץ';
        statusSub=`ישנן ${activeAlerts.length} התרעות פעילות ברחבי הארץ ` +
                 (pendingCount>0 ? `וממתין לסיום אירוע (${pendingCount})` : ``);
    }

    return (
        <div className={`fixed inset-0 flex flex-col md:flex-row transition-colors duration-1000 ${bgClass} z-0 overflow-hidden`}>
            <Toast toasts={toasts}/>

            <div className="md:hidden flex flex-shrink-0 justify-between items-center p-3 bg-slate-900 z-30 shadow-lg border-b border-slate-700">
                <div className="flex items-center gap-3">
                    <h1 className="text-lg font-bold">מערכת התרעות <span className="text-blue-400">פומבית</span></h1>
                </div>
            </div>

            <main className={`flex-1 flex flex-col min-w-0 min-h-0 bg-transparent relative z-10 transition-colors duration-1000 p-2 md:p-4 gap-2 md:gap-4 overflow-hidden w-full h-full`}>

                <div className="flex flex-col md:flex-row w-full h-full min-h-0 gap-2 md:gap-4 relative flex-1">

                    <div className="hidden md:flex flex-col gap-2 md:gap-3 md:w-[340px] shrink-0 min-h-0 overflow-y-auto custom-scrollbar">
                        <div className={`p-4 md:p-6 rounded-2xl shadow-xl transition-all duration-500 border ${statusBoxClass} flex flex-row items-center md:flex-col md:text-center z-20 shrink-0`}>
                            <i className={`fas ${statusIcon} text-4xl md:text-6xl md:mb-4 shrink-0 ml-4 md:ml-0 drop-shadow-md`}></i>
                            <div className="flex-1">
                                <h2 className="text-xl md:text-2xl font-extrabold tracking-tight leading-none mb-1">{statusTitle}</h2>
                                <p className="text-xs md:text-sm font-medium opacity-90 leading-tight">{statusSub}</p>
                            </div>
                        </div>

                        <div className="bg-slate-800/90 backdrop-blur rounded-2xl p-3 md:p-4 border border-slate-700 shadow-md shrink-0 flex flex-col gap-2 z-20">
                            <div className="flex items-center gap-2">
                                <i className="fas fa-crosshairs text-blue-400"></i>
                                <span className="text-sm font-bold">אזורי התרעה ממוקדים</span>
                            </div>
                            <textarea value={areasInput}
                                onChange={e=>{
                                    setAreasInput(e.target.value);
                                    handleDraftChange('areas',e.target.value.split(',').map(a=>a.trim()).filter(a=>a!==""));
                                }}
                                className="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-white text-xs md:text-sm focus:border-blue-500 focus:outline-none resize-none custom-scrollbar"
                                rows="1" placeholder="הקלד: חיפה, אשדוד..."></textarea>
                            <div className="flex flex-wrap gap-1 mt-1 max-h-[60px] overflow-y-auto custom-scrollbar">
                                {(draftConfig.areas||[]).map((area,i)=>(
                                    <span key={i} className="bg-blue-900/40 text-blue-200 border border-blue-700/50 px-2 py-0.5 rounded-full text-[10px]">{area}</span>
                                ))}
                            </div>
                        </div>

                        <StatusModesPanel threatLevel={status.threat_level}/>
                    </div>

                    <div className="flex-1 relative bg-slate-800 rounded-2xl shadow-xl w-full min-h-0 min-w-0 z-10">
                        <MapView
                            threatLevel={status.threat_level}
                            allAlerts={status.all_alerts}
                            isActiveTab={true}
                            monitoredAreas={draftConfig.areas||[]}
                            radiusKm={draftConfig.proximity_radius_km||10}
                            hasPendingPolygons={hasPendingPolygons}
                        />
                    </div>

                    <MobileBottomSheet
                        threatLevel={status.threat_level}
                        statusBoxClass={statusBoxClass}
                        statusIcon={statusIcon}
                        statusTitle={statusTitle}
                        statusSub={statusSub}
                        areasInput={areasInput}
                        setAreasInput={setAreasInput}
                        handleDraftChange={handleDraftChange}
                        draftConfig={draftConfig}
                    />
                </div>

            </main>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
<script src="/data/cities_polygons.js"></script>
</body>
</html>
